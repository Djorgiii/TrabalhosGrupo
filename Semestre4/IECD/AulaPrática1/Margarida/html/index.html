<!DOCTYPE html>
<html lang = "pt">
	<head>
		<title>Agenda Pessoal</title>
		
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
		<!-- Bootstrap Icons -->
	    <link
	      rel="stylesheet"
	      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
	    />
	
	    <!-- Google Fonts CSS -->
	    <link
	      href="https://fonts.googleapis.com/css?family=SUSE+Mono&display=swap"
	      rel="stylesheet"
	    />
	
	    <!-- Main CSS -->
	    <link rel="stylesheet" href="../style.css" />
	</head>
	<body>
		<div class="container my-4">
			<header class="d-flex justify-content-between align-items-center mb-3">
				<h1 class="h3">Agenda Pessoal — Calendário Académico</h1>
				<div>
					<label for="yearSelect" class="form-label visually-hidden">Ano</label>
					<select id="yearSelect" class="form-select"></select>
				</div>
			</header>

			<div class="row">
				<div class="col-md-9">
					<div class="d-flex justify-content-between align-items-center mb-2">
						<button id="prevMonth" class="btn btn-outline-secondary btn-sm">&lt;</button>
						<h2 id="monthTitle" class="mb-0"></h2>
						<button id="nextMonth" class="btn btn-outline-secondary btn-sm">&gt;</button>
					</div>

					<div id="calendar" class="calendar-grid"></div>
				</div>
				<div class="col-md-3">
					<aside>
						<h3 class="h6">Agenda</h3>
						<ul id="agendaList" class="list-group"></ul>
					</aside>
				</div>
			</div>
		</div>
		
		<script>
		// Utility: format date to YYYY-MM-DD
		function fmt(date) {
			return date.toISOString().slice(0,10);
		}

		// State
		const state = {
			calendarXml: null,
			agendaXml: null,
			today: new Date(),
			currentYear: null,
			currentMonth: null // 0-based
		};

		async function loadXml(path) {
			const resp = await fetch(path);
			const txt = await resp.text();
			const parser = new DOMParser();
			return parser.parseFromString(txt, 'application/xml');
		}

		function getNamespace(doc) {
			return doc.documentElement.namespaceURI || null;
		}

		function nsResolver(prefix) {
			return function(ns) { return ns; };
		}

		function q(node, selector, ns) {
			// small helper: querySelector with namespace handling
			if (!ns) return node.querySelector(selector);
			// convert simple tags like 'ano' to namespace-aware
			return node.getElementsByTagNameNS(ns, selector)[0];
		}

		function getElementsNS(node, localName, ns) {
			if (!ns) return node.getElementsByTagName(localName);
			return node.getElementsByTagNameNS(ns, localName);
		}

		function buildYearOptions() {
			const xml = state.calendarXml;
			const ns = getNamespace(xml);
			const anos = getElementsNS(xml, 'ano', ns);
			const select = document.getElementById('yearSelect');
			select.innerHTML = '';
			for (let i=0;i<anos.length;i++){
				const val = anos[i].getAttribute('value');
				const opt = document.createElement('option');
				opt.value = val;
				opt.textContent = val;
				select.appendChild(opt);
			}
			select.value = state.currentYear;
			select.addEventListener('change', () => {
				state.currentYear = parseInt(select.value,10);
				renderCalendar();
			});
		}

		function parseCalendarEventsForMonth(year, month) {
			// returns a map date->array of events
			const xml = state.calendarXml;
			const ns = getNamespace(xml);
			const eventsMap = {};

			// parse holidays
			const holidays = getElementsNS(xml, 'holiday', ns);
			for (let i=0;i<holidays.length;i++){
				const h = holidays[i];
				const start = h.getAttribute('start');
				const end = h.getAttribute('end') || start;
				const name = h.getAttribute('name') || h.getAttribute('id');
				let d = new Date(start);
				const endD = new Date(end);
				while (d <= endD) {
					if (d.getFullYear()===year && d.getMonth()===month) {
						const key = fmt(d);
						(eventsMap[key] = eventsMap[key]||[]).push({type:'holiday', name});
					}
					d.setDate(d.getDate()+1);
				}
			}

			// parse events (single dates and ranges)
			const events = getElementsNS(xml, 'event', ns);
			for (let i=0;i<events.length;i++){
				const e = events[i];
				const name = e.getAttribute('name') || e.getAttribute('id');
				const date = e.getAttribute('date');
				const start = e.getAttribute('start');
				const end = e.getAttribute('end');
				if (date) {
					const d = new Date(date);
					if (d.getFullYear()===year && d.getMonth()===month){
						(eventsMap[fmt(d)] = eventsMap[fmt(d)]||[]).push({type:'event', name});
					}
				} else if (start) {
					let d = new Date(start);
					const endD = end ? new Date(end) : d;
					while (d<=endD){
						if (d.getFullYear()===year && d.getMonth()===month){
							(eventsMap[fmt(d)] = eventsMap[fmt(d)]||[]).push({type:'event', name});
						}
						d.setDate(d.getDate()+1);
					}
				}
			}

			return eventsMap;
		}

		function parsePersonalAgendaForMonth(year, month) {
			const xml = state.agendaXml;
			if (!xml) return {};
			const items = xml.getElementsByTagName('item');
			const map = {};
			for (let i=0;i<items.length;i++){
				const it = items[i];
				const date = it.getAttribute('date');
				const title = it.getAttribute('title') || it.textContent;
				if (!date) continue;
				const d = new Date(date);
				if (d.getFullYear()===year && d.getMonth()===month){
					(map[date] = map[date]||[]).push({type:'personal', name:title});
				}
			}
			return map;
		}

		function mergeMaps(a,b){
			const out = {};
			for (const k in a) out[k] = (out[k]||[]).concat(a[k]);
			for (const k in b) out[k] = (out[k]||[]).concat(b[k]);
			return out;
		}

		function renderCalendar() {
			const cal = document.getElementById('calendar');
			cal.innerHTML = '';
			const year = state.currentYear;
			const month = state.currentMonth;
			const monthName = new Date(year, month, 1).toLocaleString('pt-PT', {month:'long', year:'numeric'});
			document.getElementById('monthTitle').textContent = monthName;

			// Weekday headers
			const weekdays = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
			const headerRow = document.createElement('div');
			headerRow.className = 'calendar-row header';
			weekdays.forEach(w => {
				const cell = document.createElement('div');
				cell.className = 'calendar-cell header-cell';
				cell.textContent = w;
				headerRow.appendChild(cell);
			});
			cal.appendChild(headerRow);

			// first day index (Monday=0)
			const first = new Date(year, month, 1);
			let startIdx = first.getDay() - 1; // JS: Sun=0
			if (startIdx<0) startIdx = 6; // Sunday -> 6

			const daysInMonth = new Date(year, month+1, 0).getDate();

			const acadMap = parseCalendarEventsForMonth(year, month);
			const personalMap = parsePersonalAgendaForMonth(year, month);
			const eventsMap = mergeMaps(acadMap, personalMap);

			// grid: create rows of 7
			let row;
			let day = 1;
			for (let r=0;r<6;r++){
				row = document.createElement('div');
				row.className = 'calendar-row';
				for (let c=0;c<7;c++){
					const cell = document.createElement('div');
					cell.className = 'calendar-cell';
					if (r===0 && c<startIdx){
						cell.classList.add('muted');
						row.appendChild(cell);
						continue;
					}
					if (day>daysInMonth){
						cell.classList.add('muted');
						row.appendChild(cell);
						continue;
					}
					const dateObj = new Date(year, month, day);
					const dateKey = fmt(dateObj);
					const dayNum = document.createElement('div');
					dayNum.className = 'day-number';
					dayNum.textContent = day;
					cell.appendChild(dayNum);

					// events for this day
					const evs = eventsMap[dateKey] || [];
					evs.forEach(e => {
						const badge = document.createElement('span');
						badge.className = 'badge me-1';
						if (e.type==='holiday') badge.classList.add('bg-danger');
						else if (e.type==='personal') badge.classList.add('bg-primary');
						else badge.classList.add('bg-warning text-dark');
						badge.textContent = e.name;
						badge.title = e.name;
						badge.style.display = 'inline-block';
						badge.style.marginTop = '4px';
						badge.style.fontSize = '0.7rem';
						cell.appendChild(badge);
					});

					// highlight today
					const today = state.today;
					if (dateObj.toDateString() === today.toDateString()) {
						cell.classList.add('today');
					}

					row.appendChild(cell);
					day++;
				}
				cal.appendChild(row);
			}

			// build agenda list
			const agendaList = document.getElementById('agendaList');
			agendaList.innerHTML = '';
			for (const d in personalMap){
				for (const it of personalMap[d]){
					const li = document.createElement('li');
					li.className = 'list-group-item';
					li.textContent = d + ' — ' + it.name;
					agendaList.appendChild(li);
				}
			}
		}

		function initNavigation(){
			document.getElementById('prevMonth').addEventListener('click', ()=>{
				state.currentMonth--; if (state.currentMonth<0){ state.currentMonth=11; state.currentYear--; document.getElementById('yearSelect').value = state.currentYear; }
				renderCalendar();
			});
			document.getElementById('nextMonth').addEventListener('click', ()=>{
				state.currentMonth++; if (state.currentMonth>11){ state.currentMonth=0; state.currentYear++; document.getElementById('yearSelect').value = state.currentYear; }
				renderCalendar();
			});
		}

		async function bootstrap(){
			state.calendarXml = await loadXml('../xml/CalendarioPlurianual.xml');
			// attempt to load personal agenda from Jorge folder; if not found, skip
			try{
				state.agendaXml = await loadXml('../Jorge/AgendaPessoal.xml');
			}catch(e){
				state.agendaXml = null;
			}

			state.currentYear = state.today.getFullYear();
			state.currentMonth = state.today.getMonth();
			buildYearOptions();
			initNavigation();
			renderCalendar();
		}

		document.addEventListener('DOMContentLoaded', bootstrap);
		</script>

		<script>
		  document.addEventListener("DOMContentLoaded", function () {
		    const navbarToggler = document.querySelector(".navbar-toggler");

		    if (navbarToggler) {
		      navbarToggler.addEventListener("click", function () {
		        navbarToggler.classList.toggle("change");
		      });
		    }
		  });
		</script>
	</body>
</html>
